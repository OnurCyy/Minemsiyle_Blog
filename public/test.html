<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harika Test Blogu | Mümine'msi</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #171412;
            color: #ede6e1;
            padding: 50px;
            text-align: center;
        }

        .test-box {
            background: #211d1a;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #333;
            max-width: 500px;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: #c07d56;
            font-family: 'Georgia', serif;
        }

        /* Buton Tasarımı */
        .bookmark-btn {
            background: transparent;
            border: 1px solid #333;
            color: #ede6e1;
            padding: 10px 20px;
            border-radius: 50px;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 16px;
            transition: 0.3s;
            margin-top: 20px;
        }

        .bookmark-btn i {
            font-size: 20px;
            transition: 0.3s;
        }

        .bookmark-btn:hover {
            border-color: #c07d56;
            color: #c07d56;
        }
    </style>
</head>

<body>

    <div class="test-box">
        <h1 id="postTitle">Mümine'nin Harika Test Yazısı</h1>
        <p>Bu sayfa tamamen backend'deki kaydetme sistemini test etmek için oluşturulmuştur. Butona bas ve sihrin
            gerçekleşmesini izle!</p>

        <button id="saveBtn" class="bookmark-btn" onclick="toggleSave()">
            <i id="saveIcon" class="ph ph-bookmark-simple"></i>
            <span id="saveText">Kaydet</span>
        </button>
    </div>

    <script>
        // SİSTEMİ KANDIRDIĞIMIZ SAHTE VERİLER (Sanki gerçek bir blogdaymışız gibi)
        const API_BASE = "http://localhost:5000/api"; // Kendi portuna göre ayarla!
        const currentRelatedId = "test-blog-001"; // Sahte yazı ID'si
        const currentType = "blog"; // İstersen 'book' yazıp kitap olarak test edebilirsin

        async function toggleSave() {
            const userString = localStorage.getItem('user');
            if (!userString) return alert("Giriş yapmalısın!");

            const icon = document.getElementById('saveIcon');
            const text = document.getElementById('saveText');
            const btn = document.getElementById('saveBtn');
            const pageTitle = document.getElementById('postTitle').innerText;

            const isSaved = icon.style.fill !== "none" && icon.style.fill !== "";

            // UI Animasyonu
            if (!isSaved) {
                icon.style.fill = "#c07d56"; icon.style.stroke = "#c07d56"; icon.classList.replace('ph', 'ph-fill');
                text.innerText = "Kaydedildi"; text.style.color = "#c07d56"; btn.style.borderColor = "#c07d56";
            } else {
                icon.style.fill = "none"; icon.style.stroke = "currentColor"; icon.classList.replace('ph-fill', 'ph');
                text.innerText = "Kaydet"; text.style.color = "#ede6e1"; btn.style.borderColor = "#333";
            }

            try {
                let token = localStorage.getItem('token').replace(/"/g, '').trim();

                // Backend'e Haberi Uçur
                const res = await fetch(`${API_BASE}/users/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({
                        itemId: currentRelatedId,
                        title: pageTitle,
                        type: currentType,
                        url: window.location.href
                    })
                });

                const data = await res.json();
                console.log("Backend Cevabı:", data.message);
            } catch (e) {
                console.error("Hata:", e);
            }
        }
    </script>
</body>

</html>
