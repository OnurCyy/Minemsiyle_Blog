<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okur Kimliğim | Mümine'msi</title>

    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">

    <link rel="stylesheet" href="css/profile.css">
    <link rel="icon" href="./assets/images/Logo.png" type="image/png">

    <script>
        (function () {
            var savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            if (savedTheme === 'light') document.documentElement.classList.add('light-mode');
        })();
    </script>
</head>

<body>
    <header>
        <div class="container">
            <a class="brand" href="index.html" aria-label="Ana Sayfa">
                <img src="assets/images/Logo.png" alt="Minemsiyle.com">
            </a>
            <nav class="nav-links">
                <a href="blog.html">Kütüphane</a>
            </nav>
            <div class="switch-container">
                <label class="theme-switch">
                    <input type="checkbox" id="themeCheckbox" onchange="toggleThemeSwitch()">
                    <span class="slider">
                        <i class="ph-fill ph-moon" style="font-size: 14px; color: #ccc;"></i>
                        <i class="ph-fill ph-sun" style="font-size: 14px; color: #fff;"></i>
                    </span>
                </label>
            </div>
        </div>
    </header>

    <div class="profile-layout">

        <aside class="profile-sidebar">
            <div class="profile-card">
                <div class="card-header"></div>

                <div class="avatar-container">
                    <img id="avatarDisplay" src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Avatar">
                    <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                    <label for="avatarInput" class="edit-avatar-btn" id="avatarEditIcon" style="display: none;">
                        <i class="ph-bold ph-camera"></i>
                    </label>
                </div>

                <h3 id="displayName">Kullanıcı Aranıyor...</h3>
                <p class="user-handle" id="displayEmail">@...</p>

                <div class="user-tags" id="userTagsContainer" style="margin-top: 10px;"></div>

                <div class="bio-quote">
                    <p id="displayBio">"Henüz bir dize yazılmamış..."</p>
                </div>

                <div class="profile-stats">
                    <div class="stat-box">
                        <span class="stat-num" id="statSaved">0</span>
                        <span class="stat-label">Kaydedilen</span>
                    </div>
                    <div class="stat-box">
                        <span class="stat-num" id="statComments">0</span>
                        <span class="stat-label">Yorum</span>
                    </div>
                </div>

                <div id="adminPanelBtnArea" style="padding: 10px;"></div>

                <div class="actions" style="display: none; padding: 15px; color: aliceblue;">
                    <button class="btn-full logout-btn" onclick="logout()">Güvenli Çıkış 🚪</button>
                </div>
            </div>
        </aside>

        <main class="profile-main">

            <div class="content-tabs">
                <button class="content-tab active" onclick="switchProfileTab('saved', this)">
                    <i class="ph-fill ph-bookmark-simple"></i> Kaydettiklerim
                </button>
                <button class="content-tab" onclick="switchProfileTab('comments', this)">
                    <i class="ph-fill ph-chat-text"></i> Yorumlarım
                </button>
                <button class="content-tab" onclick="switchProfileTab('settings', this)" id="settingsTabBtn">
                    <i class="ph-fill ph-gear"></i> Ayarlar
                </button>
            </div>

            <div id="saved-tab" class="tab-pane active-pane">
                <div class="empty-state">
                    <i class="ph-fill ph-books"></i>
                    <p>Kütüphanen şu an boş. Hoşuna giden yazıları buraya kaydedebilirsin.</p>
                </div>
            </div>

            <div id="comments-tab" class="tab-pane">
                <div class="empty-state">
                    <i class="ph-fill ph-chat-teardrop-text"></i>
                    <p>Henüz hiçbir yazıya yorum yapmadın. Düşüncelerini paylaşmaktan çekinme!</p>
                </div>
            </div>

            <div id="settings-tab" class="tab-pane">
                <h3 class="pane-title">Profili Düzenle</h3>
                <form id="profileSettingsForm" onsubmit="event.preventDefault(); saveSettings();">
                    <div class="input-group">
                        <label>Kullanıcı Adı</label>
                        <input type="text" id="editUsername" placeholder="Yeni kullanıcı adın">
                    </div>
                    <div class="input-group">
                        <label>Biyografi</label>
                        <textarea id="editBio" placeholder="Kendinden bahset..." rows="3"></textarea>
                    </div>
                    <div class="input-group">
                        <button type="button" class="btn-outline" onclick="togglePasswordSection()">
                            <i class="ph-fill ph-lock-key"></i> Şifremi Değiştir
                        </button>
                    </div>

                    <div id="passwordSection"
                        style="display: none; background: rgba(0,0,0,0.1); padding: 15px; border-radius: 8px; border: 1px dashed var(--border); margin-bottom: 15px;">
                        <div class="input-group">
                            <label>Yeni Şifre</label>
                            <input type="password" id="newPass" placeholder="Yeni şifreni gir">
                        </div>
                        <div class="input-group" style="margin-bottom: 0;">
                            <label>Yeni Şifre (Tekrar)</label>
                            <input type="password" id="confirmPass" placeholder="Yeni şifreni tekrar gir">
                        </div>
                    </div>
                    <button type="submit" class="btn-full" style="margin-top: 15px;">Değişiklikleri Kaydet</button>
                </form>
            </div>
        </main>
    </div>

    <div class="modal-overlay" id="cropperModal">
        <div class="modal-box" style="max-width: 500px;">
            <h2 style="margin-bottom: 15px; color: var(--accent);">Fotoğrafı Ayarla</h2>
            <div class="preview-box"></div>
            <div class="cropper-container-box">
                <img id="imageToCrop" src="" alt="Resim" style="max-width: 100%;">
            </div>
            <div style="margin-top: 15px; display: flex; gap: 10px;">
                <button class="btn-full logout-btn" onclick="closeCropper()">Vazgeç</button>
                <button class="btn-full" onclick="cropAndSave()">Böyle İyi ✅</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="js/profile.js"></script>
</body>

</html>
