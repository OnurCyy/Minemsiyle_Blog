<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profilim | Minemsiyle</title>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css">
    <link rel="stylesheet" href="css/profile.css">
    <script>
        (function () {
            // Hafızaya bak, yoksa 'light' yap
            var savedTheme = localStorage.getItem('theme') || 'light';
            // Sayfa yüklenmeden HTML'e rengi bas
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>

    <style>
        /* --- 🛠️ ÖZEL DÜZELTMELER --- */

        /* 1. YAZI TAŞMASINI ENGELLEME */
        .user-handle,
        #profileBio,
        .user-name {
            word-wrap: break-word;
            overflow-wrap: break-word;
            word-break: break-word;
            max-width: 100%;
        }

        /* 2. Avatar Düzenleme İkonu */
        .avatar-container {
            position: relative;
            display: inline-block;
        }

        .edit-avatar-btn {
            position: absolute;
            bottom: 10px;
            right: 5px;
            background: var(--accent);
            color: #1a1a1a;
            border: 2px solid var(--bg-card);
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
            z-index: 10;
        }

        .edit-avatar-btn:hover {
            transform: scale(1.1);
        }

        /* 3. Taglar */
        .user-tags {
            display: flex;
            gap: 6px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .user-tag {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 12px;
            background: #333;
            color: #ccc;
            border: 1px solid var(--border);
        }

        .owner-tag {
            background: linear-gradient(90deg, #ff0000, #ff7300, #fffb00, #48ff00, #00ffd5, #002bff, #7a00ff, #ff00c8, #ff0000);
            background-size: 400%;
            color: #fff;
            font-weight: bold;
            border: none;
            animation: glowing 20s linear infinite;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
        }

        @keyframes glowing {
            0% {
                background-position: 0 0;
            }

            100% {
                background-position: 400% 0;
            }
        }

        /* 4. Rozetler (KİLİTLİ GÖRÜNÜM AYARLARI) */
        .badges-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 12px;
            padding: 10px 0;
        }

        .badge-item {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 15px 10px;
            text-align: center;
            /* KİLİTLİ HALİ: Siyah Beyaz ve Şeffaf */
            opacity: 0.5;
            filter: grayscale(100%);
            transition: 0.4s;
        }

        /* KAZANILMIŞ HALİ: Renkli ve Parlak */
        .badge-item.earned {
            opacity: 1;
            filter: grayscale(0);
            border-color: var(--accent);
            box-shadow: 0 4px 15px rgba(196, 139, 94, 0.15);
            transform: translateY(-3px);
            background: rgba(196, 139, 94, 0.05);
            /* Hafif turuncu zemin */
        }

        .badge-icon {
            font-size: 2rem;
            margin-bottom: 8px;
            display: block;
            color: var(--accent);
        }

        .badge-item h4 {
            font-size: 0.85rem;
            margin-bottom: 4px;
            color: var(--text-main);
            font-weight: 700;
        }

        .badge-item p {
            font-size: 0.7rem;
            color: var(--text-muted);
            line-height: 1.3;
        }

        /* 5. BOŞ DURUM (EMPTY STATE) TASARIMI */
        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: var(--text-muted);
            border: 2px dashed var(--border);
            border-radius: 12px;
            margin-top: 20px;
        }

        .empty-state i {
            font-size: 3.5rem;
            margin-bottom: 15px;
            opacity: 0.3;
            color: var(--accent);
        }

        .empty-state h3 {
            color: var(--text-main);
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .empty-state p {
            font-size: 0.9rem;
            max-width: 300px;
            margin: 0 auto;
        }


        /* 5. Modallar ve Form Elemanları (DÜZELTİLDİ) */
        .modal-box input,
        .modal-box textarea {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            background: var(--bg-body);
            border: 1px solid var(--border);
            color: var(--text-main);
            outline: none;
            font-family: sans-serif;
            transition: 0.3s;
        }

        .modal-box input:focus,
        .modal-box textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px rgba(196, 139, 94, 0.2);
        }

        .modal-box textarea {
            resize: vertical;
            min-height: 80px;
        }

        .password-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .password-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-top: 10px;
        }

        .cropper-container-box {
            max-height: 400px;
            background: #000;
            margin-bottom: 15px;
        }

        .preview-box {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            overflow: hidden;
            border: 3px solid var(--accent);
            margin: 0 auto 15px auto;
        }

        /* --- LOGO BOYUT AYARI --- */
        .brand img {
            height: 60px;
            /* Yüksekliği sınırla (İsteğine göre 50px-80px yapabilirsin) */
            width: auto;
            /* Enini orantılı daralt */
            object-fit: contain;
            /* Resmi bozmadan sığdır */
            display: block;
            /* Kaymaları önle */
        }

        /* Mobilde biraz daha küçük olsun istersen: */
        @media (max-width: 768px) {
            .brand img {
                height: 45px;
            }
        }

        /* Profil Sayfasındaki Admin Butonu */
        .admin-profile-btn {
            display: block;
            /* Tam genişlik kaplasın */
            width: 100%;
            background: var(--bg-card);
            /* Kendi rengi yerine kart rengi */
            color: var(--accent);
            /* Turuncu yazı */
            border: 2px solid var(--accent);
            /* Turuncu çerçeve */
            padding: 12px;
            border-radius: 12px;
            text-align: center;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .admin-profile-btn:hover {
            background: var(--accent);
            /* Üstüne gelince turuncu olsun */
            color: white;
            /* Yazı beyaz olsun */
            transform: translateY(-3px);
            /* Hafif yukarı zıplasın */
            box-shadow: 0 5px 15px rgba(211, 84, 0, 0.3);
        }

        /* --- ROZET GÖRÜNÜMÜ VE PARILDAMA EFEKTİ --- */
        .user-tag {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin: 3px;
            color: #fff;
            /* Yazılar hep beyaz */
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);

            /* Parıldama için gerekli ayarlar */
            position: relative;
            overflow: hidden;
            cursor: default;
            transition: transform 0.2s;
        }

        /* Hover olunca hafif büyüsün */
        .user-tag:hover {
            transform: translateY(-2px);
        }

        /* ✨ PARILDAMA ANİMASYONU (SHINE EFFECT) ✨ */
        .user-tag::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: 0.5s;
        }

        .user-tag:hover::after {
            left: 100%;
        }

        /* --- ROZET GÖRÜNÜMÜ (Profile Özel) --- */
        .user-tag {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 0.5px;
            margin: 3px;
            color: #fff !important;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            position: relative;
            overflow: hidden;
            cursor: default;
            transition: transform 0.2s;
            text-transform: uppercase;
        }

        .user-tag i {
            font-size: 1rem;
        }

        /* İkon boyutu */

        .user-tag:hover {
            transform: translateY(-2px);
        }

        /* ✨ PARILDAMA EFEKTİ */
        .user-tag::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent);
            transition: 0.5s;
        }

        .user-tag:hover::after {
            left: 100%;
        }

        /* --- PROFİL RESPONSIVE AYARLARI --- */
        @media (max-width: 768px) {

            /* Profil ana kutusu alt alta dizilsin */
            .profile-container,
            .profile-header {
                flex-direction: column !important;
                align-items: center !important;
                text-align: center;
            }

            /* Sol taraftaki resim ve isim kısmı */
            .profile-info {
                width: 100% !important;
                margin-bottom: 20px;
                border-right: none !important;
                /* Aradaki çizgiyi kaldır */
                border-bottom: 1px solid var(--line);
                /* Alta çizgi ekle */
                padding-bottom: 20px;
            }

            /* Sağ taraftaki istatistikler */
            .profile-stats {
                width: 100% !important;
                justify-content: center;
                gap: 30px;
            }

            /* Sekme butonları tam otursun */
            .profile-tabs {
                justify-content: center;
                gap: 15px;
            }
        }

        /* 📱 MOBİL PROFİL: Başarımları Tam Genişlik Yap */
        @media (max-width: 768px) {

            /* Başarımlar Kutusunu Bul */
            /* Not: Class ismini tahmin ediyorum, seninki .achievements-container falan olabilir */
            .achievements-section,
            .badges-container {
                /* Kenar boşluklarını iptal et (Negatif Margin Tekniği) */
                margin-left: -20px !important;
                /* Sayfa kenar boşluğu ne kadarsa o kadar eksi ver */
                margin-right: -20px !important;

                /* Genişliği arttır ki kenarlara yapışsın */
                width: calc(100% + 40px) !important;

                /* Köşeleri sivri yap, tam otursun */
                border-radius: 0 !important;
                border-left: none !important;
                border-right: none !important;

                /* İçini biraz ferahlat */
                padding: 20px 10px !important;
                background-color: var(--bg-card);
                /* Kart rengi olsun */
            }

            /* Rozetleri ortala ve sıkıştır */
            .badges-grid {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                /* Ortala */
                gap: 15px;
                /* Rozetler arası boşluk */
            }
        }
    </style>
</head>

<body>

    <header>
        <div class="container">
            <a class="brand" href="index.html" aria-label="Ana Sayfa">
                <img src="assets/images/Logo.png" alt="Minemsiyle.com">
            </a>
            <nav class="nav-links">
                <a href="blog.html">Blog</a>
            </nav>
            <div class="switch-container">
                <label class="theme-switch">
                    <input type="checkbox" id="themeCheckbox" onchange="toggleThemeSwitch()">
                    <span class="slider">
                        <i class="ph-fill ph-moon" style="font-size: 14px; color: #ccc;"></i>
                        <i class="ph-fill ph-sun" style="font-size: 14px; color: #fff;"></i>
                    </span>
                </label>
            </div>
        </div>
    </header>

    <div class="main-layout">

        <aside class="profile-card">
            <div class="avatar-container">
                <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Avatar" class="avatar-img"
                    id="avatarDisplay">
                <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                <label for="avatarInput" class="edit-avatar-btn"><i class="ph-bold ph-pencil-simple"></i></label>
            </div>

            <h1 class="user-name" id="displayName">Yükleniyor...</h1>

            <div style="margin-bottom: 15px;">
                <span class="user-handle" id="displayEmail">@...</span>
            </div>

            <div class="user-tags" id="userTagsContainer"></div>

            <p id="displayBio"
                style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 20px; font-style: italic;">
                "Henüz bir biyografi eklenmemiş."
            </p>

            <div class="stats">
                <div class="stat-box"><strong id="statSaved">0</strong><span>Kaydedilen</span></div>
                <div class="stat-box"><strong id="statComments">0</strong><span>Yorum</span></div>
            </div>

            <div class="profile-info">
                <div id="adminPanelBtnArea" style="margin: 20px 0;"></div>
            </div>

            <button class="action-btn" onclick="openSettings()">Profili Düzenle ⚙️</button>
            <button class="action-btn logout-btn" onclick="logout()">Güvenli Çıkış 🚪</button>
        </aside>

        <section class="content-area">
            <div class="tabs">
                <div class="tab" onclick="switchTab('badges')">🏆 Rozetler</div>
            </div>

            <div id="saved-content" class="tab-content active"></div>

            <div id="badges-content" class="tab-content" style="display: block !important;">
                <div class="badges-grid" id="badgesList"></div>
            </div>
        </section>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-box">
            <h2 style="margin-bottom: 20px; font-family: 'Merriweather', serif;">Profili Düzenle</h2>
            <div class="form-group">
                <label style="color: #888; font-size: 0.85rem;">Kullanıcı Adı</label>
                <input type="text" id="editUsername" placeholder="İsminiz">
            </div>
            <div class="form-group" style="margin-top: 10px;">
                <label style="color: #888; font-size: 0.85rem;">Hakkımda (Bio)</label>
                <textarea id="editBio" placeholder="Kendinden bahset..."></textarea>
            </div>
            <hr style="border: 0; border-top: 1px solid var(--border); margin: 15px 0;">
            <p style="color: var(--accent); font-size: 0.8rem;">🔒 Şifre Değiştir</p>
            <div class="password-grid">
                <input type="password" id="newPass" placeholder="Yeni Şifre">
                <input type="password" id="confirmPass" placeholder="Tekrar">
            </div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button class="action-btn logout-btn" onclick="closeSettings()">İptal</button>
                <button class="action-btn" onclick="saveSettings()">Kaydet</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="cropperModal">
        <div class="modal-box" style="max-width: 500px;">
            <h2 style="margin-bottom: 15px;">Fotoğrafı Ayarla</h2>
            <div class="preview-box box-shadow"></div>
            <div class="cropper-container-box">
                <img id="imageToCrop" src="" alt="Resim" style="max-width: 100%;">
            </div>
            <div style="margin-top: 15px; display: flex; gap: 10px;">
                <button class="action-btn logout-btn" onclick="closeCropper()">Vazgeç</button>
                <button class="action-btn" onclick="cropAndSave()">Böyle İyi ✅</button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>
    <script src="js/main.js"></script>

    <script>
        // --- 1. OTOMATİK İSİM DÜZELTME (Olası hatalara karşı) ---
        (function autoClean() {
            try {
                let user = JSON.parse(localStorage.getItem('user'));
                if (user && user.username && user.username.includes(':')) {
                    user.username = user.username.split(':')[0];
                    localStorage.setItem('user', JSON.stringify(user));
                }
            } catch (e) { }
        })();

        // --- GLOBAL AYARLAR ---
        const API_BASE = "/api";
        let cropper;
        const defaultAvatar = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

        // 🔥 ROZET SÖZLÜĞÜ (BAŞARIM LİSTESİ)
        const badgeDictionary = {
            'admin': { label: 'Yönetici', color: '#d63031', icon: 'ph-crown', desc: 'Sitenin Mutlak Hakimi' },
            'mod': { label: 'Moderatör', color: '#e67e22', icon: 'ph-shield-star', desc: 'Düzenin Bekçisi' },
            'dev': { label: 'Geliştirici', color: '#0984e3', icon: 'ph-code', desc: 'Kodların Efendisi' },
            'vip': { label: 'VIP Üye', color: '#f1c40f', icon: 'ph-sparkle', desc: 'Ayrıcalıklı Özel Üye', textDark: true },
            'supporter': { label: 'Destekçi', color: '#e84393', icon: 'ph-heart', desc: 'Siteye Destek Olan' },
            'verified': { label: 'Onaylı', color: '#00b894', icon: 'ph-check-circle', desc: 'Güvenilir Hesap' },
            'writer': { label: 'Yazar', color: '#9b59b6', icon: 'ph-pen-nib', desc: 'Hikaye Anlatıcısı' },
            'poet': { label: 'Şair', color: '#a29bfe', icon: 'ph-feather', desc: 'Kelimelerin Dansçısı' },
            'bug_hunter': { label: 'Bug Avcısı', color: '#00cec9', icon: 'ph-bug', desc: 'Hataları Bulan Dedektif' },
            'bookworm': { label: 'Kitap Kurdu', color: '#6ab04c', icon: 'ph-book-open', desc: 'Okumadan Duramayan' },
            'coffee': { label: 'Kahve Sever', color: '#6d4c41', icon: 'ph-coffee', desc: 'Kafein Bağımlısı' },
            'cat_lover': { label: 'Kedi Sever', color: '#ff9f43', icon: 'ph-cat', desc: 'Miyav!' }
        };

        // --- SAYFA YÜKLENİNCE ---
        document.addEventListener("DOMContentLoaded", () => {
            initVisitCounter();
            checkTheme();
            loadUserProfile();
        });

        // --- 2. PROFİL YÜKLEME ---
        async function loadUserProfile() {
            const params = new URLSearchParams(window.location.search);
            let targetUsername = params.get('u');
            const sessionUser = JSON.parse(localStorage.getItem('user'));

            // Linkte ?u=yoksa, giriş yapan kullanıcıyı göster
            if (!targetUsername) {
                if (sessionUser) targetUsername = sessionUser.username;
                else return window.location.href = "login.html";
            }
            // Hata temizliği
            if (targetUsername) targetUsername = targetUsername.replace(/:\d+$/, '');

            try {
                const res = await fetch(`${API_BASE}/users/${targetUsername}`);
                if (!res.ok) {
                    document.getElementById('displayName').innerText = "Kullanıcı Bulunamadı";
                    return;
                }
                const user = await res.json();

                // Verileri Ekrana Bas
                if (document.getElementById('avatarDisplay')) document.getElementById('avatarDisplay').src = user.avatar || defaultAvatar;
                if (document.getElementById('displayName')) document.getElementById('displayName').innerText = user.username;
                if (document.getElementById('displayBio')) document.getElementById('displayBio').innerText = user.bio || "Henüz bir biyografi yok.";
                if (document.getElementById('displayEmail')) document.getElementById('displayEmail').innerText = user.email || "";

                // 🔥 ROZET SİSTEMLERİNİ ÇALIŞTIR
                renderUserTags(user);     // İsim altı (Küçük etiketler)
                renderAchievements(user); // Sağ taraf (Büyük Başarım Listesi)

                // Admin Butonu Kontrolü (Sadece Kendi Profilinde ve Yetkiliyse)
                const actions = document.querySelector('.actions');
                const adminBtn = document.getElementById('adminPanelBtnArea');

                if (sessionUser && sessionUser.username === user.username) {
                    if (actions) actions.style.display = 'flex';
                    if (user.role === 'admin' || user.username === 'OnurCy') {
                        if (adminBtn) {
                            adminBtn.style.display = 'block';
                            adminBtn.innerHTML = `<a href="adminPanel.html" class="action-btn" style="background:#d63031; color:white; width:100%; justify-content:center; text-decoration:none;">👑 Yönetici Paneli</a>`;
                        }
                    }
                } else {
                    if (actions) actions.style.display = 'none';
                    if (adminBtn) adminBtn.style.display = 'none';
                }

            } catch (error) { console.error(error); }
        }

        // --- 3. İSİM ALTI ETİKETLER (Sadece Kazanılanlar) ---
        function renderUserTags(user) {
            const tagsBox = document.getElementById('userTagsContainer');
            if (!tagsBox) return;
            let tags = user.tags || user.badges || [];
            if (typeof tags === 'string') tags = tags.split(',');

            if (tags.length > 0) {
                tagsBox.innerHTML = tags.map(tag => {
                    const info = badgeDictionary[tag] || { color: '#333', icon: 'ph-tag', label: tag.toUpperCase() };
                    const textColor = info.textDark ? '#000' : '#fff';
                    return `
                        <span class="user-tag" style="background:${info.color}; color:${textColor}; padding:4px 10px; border-radius:12px; font-size:11px; display:inline-flex; align-items:center; gap:4px; margin:2px; font-weight:bold; box-shadow: 0 2px 5px rgba(0,0,0,0.3);">
                            <i class="ph-fill ${info.icon}"></i> ${info.label}
                        </span>`;
                }).join('');
            } else {
                tagsBox.innerHTML = `<span class="user-tag" style="background:#2d3436; color:#aaa; padding:4px 10px; border-radius:12px;">Üye</span>`;
            }
        }

        // --- 4. SAĞ TARAFTAKİ BAŞARIM LİSTESİ (Kilitli/Açık Sistemi) ---
        function renderAchievements(user) {
            const container = document.getElementById('badgesList');
            if (!container) return;

            let userBadges = user.tags || user.badges || [];
            if (typeof userBadges === 'string') userBadges = userBadges.split(',');

            container.innerHTML = "";

            // Sözlükteki HER BİR rozeti dönüyoruz (Kazanmasa bile görecek)
            Object.keys(badgeDictionary).forEach(key => {
                const info = badgeDictionary[key];
                const isEarned = userBadges.includes(key); // Kullanıcıda bu rozet var mı?

                // Stil Ayarları: Kazanılmışsa Parlak, Değilse Sönük ve Gri
                const opacity = isEarned ? '1' : '0.5';
                const filter = isEarned ? 'none' : 'grayscale(100%)';
                const border = isEarned ? `1px solid ${info.color}66` : '1px solid #333';
                const bg = isEarned ? `rgba(255,255,255,0.05)` : 'transparent';

                // Kilit İkonu
                const lockIcon = isEarned ? '' : '<i class="ph-fill ph-lock-key" style="position:absolute; right:15px; font-size:24px; color:#555;"></i>';

                const html = `
                    <div class="badge-item" style="display:flex; align-items:center; gap:15px; background:${bg}; padding:15px; margin-bottom:10px; border-radius:12px; border:${border}; position:relative; opacity:${opacity}; filter:${filter}; transition:0.3s;">
                        <div style="background:${info.color}22; width:50px; height:50px; min-width:50px; border-radius:50%; display:flex; align-items:center; justify-content:center; color:${info.color}; font-size:24px;">
                            <i class="ph-fill ${info.icon}"></i>
                        </div>
                        <div>
                            <h4 style="color:${info.color}; margin:0; font-size:16px; font-weight:bold;">${info.label}</h4>
                            <p style="color:#bbb; margin:4px 0 0 0; font-size:13px;">${info.desc}</p>
                        </div>
                        ${lockIcon}
                    </div>`;
                container.innerHTML += html;
            });
        }

        // --- 5. PROFİL GÜNCELLEME (Gelişmiş Dedektif Modu 🕵️‍♂️) ---
        async function saveSettings() {
            const newName = document.getElementById('editUsername').value;
            const newBio = document.getElementById('editBio').value;
            const newPass = document.getElementById('newPass').value;

            const updateData = {};
            if (newName) updateData.username = newName;
            if (newBio) updateData.bio = newBio;
            if (newPass && newPass.length >= 4) updateData.newPassword = newPass;

            // 🔥 KRİTİK DÜZELTME BURADA:
            // Anahtar 'token' mi yoksa 'userToken' mi? İkisine de bak, hangisi doluysa onu al.
            const token = localStorage.getItem('token') || localStorage.getItem('userToken');

            // 🕵️‍♂️ KONSOLA YAZDIR (F12'ye basıp Console'a bakabilirsin)
            console.log("--------------------------------");
            console.log("🔍 GÜNCELLEME İŞLEMİ BAŞLADI");
            console.log("🔑 Bulunan Token:", token ? "Token Var (Başlangıcı: " + token.substring(0, 10) + "...)" : "YOK! ❌");
            console.log("📤 Gönderilecek Veri:", updateData);

            if (!token) {
                alert("HATA: Giriş anahtarı (Token) bulunamadı! Lütfen tekrar giriş yap.");
                window.location.href = "login.html";
                return;
            }

            try {
                const res = await fetch(`${API_BASE}/users/update`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}` // Anahtarı gönderiyoruz
                    },
                    body: JSON.stringify(updateData)
                });

                if (res.ok) {
                    alert("✅ İŞTE BU! Profil güncellendi.");

                    // İsmi değiştirdiyse localStorage'ı da güncelle
                    let user = JSON.parse(localStorage.getItem('user'));
                    if (newName && user) {
                        user.username = newName;
                        localStorage.setItem('user', JSON.stringify(user));
                    }
                    location.reload();
                } else {
                    const data = await res.json();
                    console.error("Sunucu Hatası:", data);

                    if (res.status === 401 || res.status === 403) {
                        alert("GÜVENLİK UYARISI: Oturum süren dolmuş veya yetkin yok. Çıkış yapılıyor...");
                        localStorage.clear();
                        window.location.href = "login.html";
                    } else {
                        alert("Hata: " + (data.message || "Güncellenemedi"));
                    }
                }
            } catch (err) {
                console.error("Fetch Hatası:", err);
                alert("Sunucuya ulaşılamadı! Backend kapalı olabilir.");
            }
        }
        // --- DİĞER FONKSİYONLAR ---
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.style.display = 'none');

            if (tabName === 'badges') {
                // HTML yapına göre ID kontrolü
                if (document.getElementById('badgesList')) document.getElementById('badgesList').parentElement.style.display = 'block';
                else if (document.getElementById('badges-content')) document.getElementById('badges-content').style.display = 'block';
            } else {
                const target = document.getElementById(tabName + '-content');
                if (target) target.style.display = 'block';
            }
            document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
            // Basit buton aktiflik ayarı
            const tabs = document.querySelectorAll('.tab');
            if (tabName === 'saved' && tabs[0]) tabs[0].classList.add('active');
            if (tabName === 'badges' && tabs[1]) tabs[1].classList.add('active');
        }

        function checkTheme() {
            if (localStorage.getItem('theme') === 'light') {
                document.body.classList.add('light-mode');
                if (document.getElementById('themeCheckbox')) document.getElementById('themeCheckbox').checked = true;
            }
        }
        function toggleThemeSwitch() {
            const cb = document.getElementById('themeCheckbox');
            document.body.classList.toggle('light-mode');
            localStorage.setItem('theme', cb.checked ? 'light' : 'dark');
        }
        function initVisitCounter() {
            if (!sessionStorage.getItem('counted')) {
                let v = parseInt(localStorage.getItem('visits') || '0') + 1;
                localStorage.setItem('visits', v);
                sessionStorage.setItem('counted', 'true');
            }
        }
        function openSettings() { document.getElementById('settingsModal').classList.add('open'); }
        function closeSettings() { document.getElementById('settingsModal').classList.remove('open'); }
        function logout() {
            if (confirm("Çıkış yapılıyor?")) { localStorage.clear(); window.location.href = 'login.html'; }
        }

        // --- FOTOĞRAF KIRPMA (Cropper.js) ---
        const avatarInput = document.getElementById('avatarInput');
        const imageToCrop = document.getElementById('imageToCrop');
        const cropperModal = document.getElementById('cropperModal');
        if (avatarInput) {
            avatarInput.addEventListener('change', function (e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function (event) {
                        imageToCrop.src = reader.result;
                        cropperModal.classList.add('open');
                        if (cropper) cropper.destroy();
                        cropper = new Cropper(imageToCrop, { aspectRatio: 1, viewMode: 1 });
                    };
                    reader.readAsDataURL(file);
                }
            });
        }
        function closeCropper() {
            if (cropperModal) cropperModal.classList.remove('open');
            if (cropper) { cropper.destroy(); cropper = null; }
            if (avatarInput) avatarInput.value = "";
        }
        async function cropAndSave() {
            if (!cropper) return;
            const canvas = cropper.getCroppedCanvas({ width: 400, height: 400 });
            const base64Image = canvas.toDataURL("image/jpeg", 0.8);
            const token = localStorage.getItem('token');
            try {
                const res = await fetch(`${API_BASE}/users/update`, {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ avatar: base64Image })
                });
                if (res.ok) {
                    document.getElementById('avatarDisplay').src = base64Image;
                    closeCropper();
                    alert("Fotoğraf güncellendi! 📸");
                    location.reload();
                }
            } catch (e) { alert("Hata oluştu."); }
        }
    </script>
