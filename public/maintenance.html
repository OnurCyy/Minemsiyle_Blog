<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bakımdayız | Minemsiyle</title>
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2232/2232688.png" type="image/png">
    <link rel="stylesheet" href="/css/maintenance.css">
</head>

<body>

    <div id="maintenance-content">
        <div class="icon">🚧</div>
        <h1>Şu An Tadilattayız</h1>
        <p>Minemsiyle.com şu anda güzelleşiyor. Çok kısa süre sonra daha iyi bir şekilde buradayız. Çayını al, birazdan
            gel. ☕</p>

        <button class="admin-trigger" onclick="showLogin()">Yönetici Girişi</button>
    </div>

    <div id="login-form">
        <h3 class="form-title">Yönetim Paneli</h3>

        <div class="input-group">
            <label for="email">E-Posta</label>
            <input type="email" id="email" placeholder="admin@minemsiyle.com">
        </div>

        <div class="input-group">
            <label for="password">Şifre</label>
            <input type="password" id="password" placeholder="••••••">
        </div>

        <button class="login-btn" onclick="handleLogin()">Giriş Yap</button>
        <button class="back-btn" onclick="hideLogin()">Vazgeç</button>
    </div>

    <script src="/js/maintenance.js"></script>
</body>

</html>
