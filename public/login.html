<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giriş Yap | Minemsiyle</title>
    <link rel="icon" href="/assets/images/Logo.png" type="image/png">

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Lora:ital,wght@0,400;1,500&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <link rel="stylesheet" href="/css/login.css">
</head>

<body>

    <div class="auth-container">
        <div class="auth-tabs">
            <button class="auth-tab active" id="loginTab" onclick="switchTab('login')">Giriş Yap</button>
            <button class="auth-tab" id="registerTab" onclick="switchTab('register')">Kayıt Ol</button>
        </div>

        <h2>Mümine'msi</h2>
        <p class="subtitle">Okur dünyasına hoş geldin.</p>

        <form id="loginForm" class="active-form">
            <div class="input-group">
                <input type="email" id="loginEmail" placeholder="E-posta Adresi" required>
            </div>
            <div class="input-group">
                <input type="password" id="loginPassword" placeholder="Şifre" required>
            </div>
            <a href="#" class="link forgot-password-link" onclick="openResetModal()">Şifremi Unuttum?</a>
            <button type="submit" class="btn-full">Kütüphaneye Gir</button>
        </form>

        <form id="registerForm" style="display: none;">
            <div class="input-group">
                <input type="text" id="regUsername" placeholder="Kullanıcı Adı" required>
            </div>
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="E-posta Adresi" required>
            </div>
            <div class="input-group">
                <input type="password" id="regPassword" placeholder="Şifre Belirle" required>
            </div>
            <button type="submit" class="btn-full">Okur Kartı Oluştur</button>
        </form>

        <div class="social-section">
            <p>Hızlı Erişim</p>
            <div class="social-btns-row">
                <div class="social-btn" onclick="loginWithGoogle()"><i class="ph-fill ph-google-logo"></i></div>
                <div class="social-btn" onclick="loginWithDiscord()"><i class="ph-fill ph-discord-logo"></i></div>
                <div class="social-btn" onclick="loginWithTwitter()"><i class="ph-fill ph-twitter-logo"></i></div>
            </div>
        </div>

        <div class="back-link-container">
            <a href="index.html" class="link">← Ana Sayfaya Dön</a>
        </div>
    </div>
    <div id="reset-modal" class="modal-overlay">
        <div class="modal-content">
            <i class="ph ph-x modal-close-icon" onclick="closeResetModal()"></i>

            <div class="modal-header">
                <div class="modal-icon-wrapper">
                    <i class="ph-fill ph-lock-key-open"></i>
                </div>
                <h3>Hesabını Kurtar</h3>
                <p>Kod gönderip şifreni yenile.</p>
            </div>

            <div class="modal-body">
                <div class="modal-input-wrapper">
                    <label>E-POSTA</label>
                    <div class="flex-row">
                        <input type="email" id="resetEmail" placeholder="mail@adresin.com">
                        <button onclick="sendCode()" id="sendCodeBtn" class="modal-inline-btn">Kod Gönder</button>
                    </div>
                </div>

                <div class="modal-input-wrapper">
                    <label>GELEN KOD</label>
                    <input type="text" id="resetCode" placeholder="######" maxlength="6" class="code-input">
                </div>

                <div class="modal-input-wrapper relative">
                    <label>YENİ ŞİFRE</label>
                    <input type="password" id="resetNewPass" placeholder="Yeni şifren...">
                    <i class="ph ph-eye-slash toggle-pass-icon" id="togglePassIcon"
                        onclick="togglePasswordVisibility()"></i>
                </div>
            </div>

            <button onclick="verifyAndReset()" class="btn-full modal-submit-btn">Şifreyi Değiştir</button>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="/js/login.js"></script>
</body>

</html>
