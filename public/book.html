<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kitap Yükleniyor... | Minemsiyle</title>
    <link rel="icon" href="/assets/images/Logo.png" type="image/png">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/book.css">
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

</head>

<body>

    <header class="header">
        <div class="header__inner">
            <div class="brand">
                <a class="brand__logo" href="/">
                    <img src="/assets/images/Logo.png" alt="Minemsiyle" style="height: 40px;">
                </a>
            </div>
            <nav class="nav">
                <a href="/" class="nav__link">Ana Sayfa</a>

                <div class="theme-switch-wrapper">
                    <label class="theme-switch" for="checkbox">
                        <input type="checkbox" id="checkbox" />
                        <div class="slider round"></div>
                    </label>
                </div>
            </nav>
        </div>
    </header>

    <main class="container" style="max-width: 800px; margin: 40px auto; padding: 20px;">

        <div id="articleArea" class="book-content-wrapper">
            <div style="text-align:center; padding:50px;">
                <div class="loading-spinner"></div>
                <p>Kitap yükleniyor...</p>
            </div>
        </div>

        <div id="interactionArea" style="display:none;">
            <div class="interaction-bar" style="margin-top:30px; margin-bottom:30px;">
                <button class="action-btn-icon like-btn" onclick="toggleLike(this)">
                    <i class="ph-bold ph-heart"></i>
                </button>
                <span style="margin-left:10px;">Kitabı beğen</span>
            </div>

            <div class="blog-comments-section">
                <div class="blog-comment-header">
                    <i class="ph-duotone ph-chats-teardrop"></i> Okur Köşesi (<span id="commentCount">0</span>)
                </div>

                <div class="blog-comment-box">
                    <textarea id="commentText" placeholder="Kitap hakkındaki düşüncelerin neler?"></textarea>
                    <div class="blog-comment-footer">
                        <button class="blog-send-btn" onclick="postComment()">Yorumu Yayınla 🚀</button>
                    </div>
                </div>

                <div class="comments-list" id="commentsList" style="margin-top: 30px;"></div>
            </div>
        </div>

    </main>

    <div class="ambiance-widget" id="ambianceWidget">
        <button class="ambiance-toggle" onclick="toggleAmbiancePanel()" title="Odak Modu">
            <span class="music-note">🎵</span>
        </button>

        <div class="ambiance-panel" id="ambiancePanel">
            <div class="ambiance-header">
                <span>Odak Modu</span>
                <button onclick="toggleAmbiancePanel()"
                    style="background:none; border:none; color:var(--muted); cursor:pointer;">✕</button>
            </div>

            <div class="sound-options">
                <div class="sound-item" onclick="playAmbiance('rain', this)">
                    <span>🌧️</span>
                    <small>Yağmur</small>
                </div>
                <div class="sound-item" onclick="playAmbiance('cafe', this)">
                    <span>☕</span>
                    <small>Kafe</small>
                </div>
                <div class="sound-item" onclick="playAmbiance('fire', this)">
                    <span>🔥</span>
                    <small>Şömine</small>
                </div>
                <div class="sound-item" onclick="playAmbiance('forest', this)">
                    <span>🌲</span>
                    <small>Orman</small>
                </div>
                <div class="sound-item" onclick="playAmbiance('night', this)">
                    <span>🌙</span>
                    <small>Gece</small>
                </div>
                <div class="sound-item" onclick="playAmbiance('snow', this)">
                    <span>❄️</span>
                    <small>Kar</small>
                </div>
            </div>

            <div class="volume-container">
                <span style="font-size:12px; color:var(--muted);">Ses:</span>
                <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="0.5">
            </div>
        </div>

        <div id="audio-container">
            <audio id="audio-rain" loop src="/assets/sounds/Yagmur.mp3"></audio>

            <audio id="audio-cafe" loop src="/assets/sounds/Cafe.mp3"></audio>

            <audio id="audio-fire" loop src="/assets/sounds/KampAtesi.mp3"></audio>

            <audio id="audio-forest" loop src="/assets/sounds/Doga.mp3"></audio>

            <audio id="audio-night" loop src="/assets/sounds/Gece.mp3"></audio>

            <audio id="audio-snow" loop src="/assets/sounds/Kar.mp3"></audio>
        </div>
    </div>


    <footer
        style="text-align:center; padding:40px 0; color:var(--muted); font-size:12px; border-top:1px solid var(--line); margin-top:50px;">
        &copy; 2026 Minemsiyle • Keyifli Okumalar
    </footer>

    <script>
        // ==========================================
        // 🌍 GLOBAL AYARLAR VE URL PARÇALAMA
        // ==========================================
        const API_BASE = "/api";
        const API_URL_POST = "/api"; // Eski kodlarla uyumlu olsun diye bıraktım
        let contentId = null;
        const defaultAvatar = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

        // 🔥 YENİ SİSTEM: URL'DEN ID/SLUG OKUMA
        const pathArray = window.location.pathname.split('/');
        const currentRelatedId = pathArray[pathArray.length - 1]; // Linkin sonundaki yazıyı alır
        const currentType = 'book'; // Bu sayfa sadece kitaplar içindir

        // ==========================================
        // 1. SAYFA YÜKLENİNCE KİTABI GETİR
        // ==========================================
        document.addEventListener("DOMContentLoaded", async () => {

            // Tema ve Kullanıcı Kontrolü
            checkUserLoginForComments();
            const toggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
            if (toggleSwitch) {
                const currentTheme = localStorage.getItem('theme');
                if (currentTheme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.body.classList.add('dark', 'dark-theme');
                    toggleSwitch.checked = true;
                }

                toggleSwitch.addEventListener('change', (e) => {
                    if (e.target.checked) {
                        document.documentElement.setAttribute('data-theme', 'dark');
                        document.body.classList.add('dark', 'dark-theme');
                        localStorage.setItem('theme', 'dark');
                    } else {
                        document.documentElement.setAttribute('data-theme', 'light');
                        document.body.classList.remove('dark', 'dark-theme');
                        localStorage.setItem('theme', 'light');
                    }
                });
            }

            // ID Kontrolü (Hatalı linkle geldiyse)
            if (!currentRelatedId || currentRelatedId === "kitap") {
                showError("Linkte ID bulunamadı. Lütfen ana sayfadan tekrar deneyin.");
                return;
            }

            console.log("İstek atılan Kitap ID/Slug:", currentRelatedId);
            window.currentRelatedId = currentRelatedId;

            // Backend'den Kitabı Çek
            try {
                const res = await fetch(`${API_BASE}/books/${currentRelatedId}`);

                if (!res.ok) {
                    console.error("Backend Hatası:", res.status);
                    showError(`Kitap bulunamadı! (Hata Kodu: ${res.status}) <br> Aranan: ${currentRelatedId}`);
                    return;
                }

                const post = await res.json();
                console.log("Gelen Veri:", post);

                contentId = post._id || currentRelatedId;

                // Sayfayı Doldur
                renderBook(post);

                // Etkileşimleri Başlat
                updateHeaderProfile();
                checkLikeStatus();
                loadComments();

            } catch (err) {
                console.error("Fetch Hatası:", err);
                showError("Sunucuya bağlanılamadı. Backend kapalı olabilir.");
            }
        });

        // KİTABI EKRANA ÇİZME FONKSİYONU
        function renderBook(post) {
            const date = new Date(post.createdAt || post.date || Date.now()).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
            const contentArea = document.getElementById("articleArea");
            const interactionArea = document.getElementById("interactionArea");

            document.title = `${post.title} | Minemsiyle`;

            const imageSrc = post.cover || "https://via.placeholder.com/300x450?text=Kapak+Yok";

            contentArea.innerHTML = `
            <div class="book-hero">
                <div class="book-cover-wrapper">
                    <img src="${imageSrc}" class="book-cover-img" alt="${post.title}">
                </div>

                <div class="book-info">
                    <span class="book-tag">${post.tag || "Kitap"}</span>
                    <h1 class="book-title">${post.title}</h1>
                    
                    <div class="book-meta">
                        <span>✍️ ${post.author || "Bilinmiyor"}</span>
                        <span>📅 ${date}</span>
                        ${post.pageCount ? `<span style="margin:0 8px; opacity:0.5">|</span> <span>📄 ${post.pageCount} Sayfa</span>` : ''}
                    </div>

                    <div class="book-desc">
                        ${formatContent(post.desc || post.content)}
                    </div>
                    
                    ${post.publisher ? `<p style="margin-top:20px; font-size:0.9rem; color:var(--muted);"><em>Yayınevi: ${post.publisher}</em></p>` : ''}
                </div>
            </div>
            `;

            if (interactionArea) interactionArea.style.display = "block";
        }

        function showError(message) {
            const area = document.getElementById("articleArea");
            area.innerHTML = `
            <div style="text-align:center; padding:50px; background:var(--bg-card); border-radius:12px; border:1px solid var(--border);">
                <h2 style="color:#ef4444;">😔 Ops!</h2>
                <p>${message}</p>
                <a href="/" style="display:inline-block; margin-top:20px; color:var(--accent); text-decoration:underline;">Ana Sayfaya Dön</a>
            </div>
            `;
        }

        function formatContent(text) {
            if (!text) return "İçerik yok.";
            return text.split('\n').map(p => p.trim() ? `<p>${p}</p>` : "").join('');
        }

        // ==========================================
        // 2. YARDIMCI FONKSİYONLAR & PROFİL
        // ==========================================
        function updateHeaderProfile() {
            const user = JSON.parse(localStorage.getItem('user'));
            const profileLink = document.getElementById('headerProfileLink');
            if (user && user.avatar && profileLink) {
                profileLink.innerHTML = `<img src="${user.avatar}" class="header-avatar-img" alt="Profil">`;
                profileLink.href = "/profile.html";
            }
        }

        function checkUserLoginForComments() {
            const user = JSON.parse(localStorage.getItem('user'));
            const commentBox = document.querySelector('.blog-comment-box');
            if (!commentBox) return;
            if (!user) {
                commentBox.innerHTML = `
                <div style="padding: 30px; text-align: center; color: var(--text-muted); background: var(--bg-card); border: 1px dashed var(--border); border-radius: 12px;">
                    <i class="ph-duotone ph-lock-key" style="font-size: 2rem; margin-bottom: 10px; color: var(--accent);"></i>
                    <p style="margin:0;">Yorum yapmak için <a href="/login.html" style="color: var(--accent); font-weight: bold; text-decoration: underline;">giriş yapmalısın</a>.</p>
                </div>
            `;
            }
        }

        // ==========================================
        // 3. YORUM SİSTEMİ (ZIRHLI)
        // ==========================================
        async function postComment() {
            const input = document.getElementById('commentText');
            const rawUser = localStorage.getItem('user');

            if (!rawUser) {
                alert("Giriş yapmamışsın Kral! Login sayfasına yönlendiriyorum.");
                window.location.href = "/login.html";
                return;
            }

            const user = JSON.parse(rawUser);
            const userId = user._id || user.id;

            if (!userId) {
                alert("Kimlik bilgisi bozulmuş (Eski veri). Güvenlik için seni çıkışa atıyorum, tekrar girince düzelecek! 🔄");
                localStorage.clear();
                window.location.href = "/login.html";
                return;
            }

            let token = localStorage.getItem('token') || localStorage.getItem('userToken');
            if (!token) return alert("Anahtarın (Token) eksik. Tekrar giriş yapmalısın.");
            token = token.replace(/"/g, '').trim();

            const text = input.value.trim();
            if (!text) return alert("Boş yorum olmaz! ✍️");

            const btn = document.querySelector('.blog-send-btn');
            if (btn) { btn.innerText = "⏳..."; btn.disabled = true; }

            try {
                // Kitabın başlığını HTML'den alıyoruz (Yorum profilinde gözükmesi için)
                const pageTitle = document.querySelector('.book-title') ? document.querySelector('.book-title').innerText : document.title;

                const payload = {
                    userId: userId,
                    username: user.username,
                    avatar: user.avatar,
                    content: text,
                    contentType: currentType, // 'book'
                    relatedId: currentRelatedId,
                    title: pageTitle // 🔥 İSİM BURADA GÖNDERİLİYOR
                };

                const res = await fetch("/api/comments", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    input.value = "";
                    loadComments();
                    alert("Yorumun yapıştırıldı! 🚀");
                } else {
                    const err = await res.json();
                    alert("Hata: " + (err.message || "Sunucu reddetti"));
                }
            } catch (err) {
                console.error("Bağlantı Hatası:", err);
                alert("Sunucuya ulaşılamadı!");
            } finally {
                if (btn) { btn.innerText = "Yorumu Yayınla 🚀"; btn.disabled = false; }
            }
        }

        async function loadComments() {
            const list = document.getElementById('commentsList');
            const countSpan = document.getElementById('commentCount');
            const currentUser = JSON.parse(localStorage.getItem('user'));

            if (!currentRelatedId) return;

            try {
                const res = await fetch(`${API_BASE}/comments?type=${currentType}&id=${currentRelatedId}`);
                const comments = await res.json();

                if (list) list.innerHTML = "";
                if (countSpan) countSpan.innerText = comments.length;

                if (comments.length === 0 && list) {
                    list.innerHTML = "<p style='color:#888; font-style:italic; text-align:center; padding: 20px;'>Henüz yorum yok. İlk yorumu sen yap! 👇</p>";
                    return;
                }

                for (const c of comments) {
                    const displayDate = new Date(c.date).toLocaleDateString('tr-TR') + ' • ' + new Date(c.date).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
                    let badgeHTML = (c.username === "Minemsi" || c.username === "OnurCy") ? `<span style="background:#ffd700; color:#000; font-size:0.7rem; padding:3px 8px; border-radius:6px; margin-left:5px; font-weight:bold;">👑 Yönetici</span>` : "";

                    let deleteBtnHTML = "";
                    const isOwner = currentUser && (currentUser.username === c.username);
                    const isAdmin = currentUser && (currentUser.role === 'admin' || currentUser.username === 'OnurCy');

                    if (isOwner || isAdmin) {
                        deleteBtnHTML = `<button onclick="deleteComment('${c._id}')" style="background:none; border:none; color:#e74c3c; font-size:0.8rem; cursor:pointer; margin-top:8px; padding:0; display:flex; align-items:center; gap:4px; opacity:0.8; transition:0.3s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'"><i class="ph-bold ph-trash"></i> Sil</button>`;
                    }

                    const profileLink = `/profile.html?u=${c.username}`;

                    const html = `
                    <div class="single-comment" style="display:flex; gap:15px; margin-bottom:15px; background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                        <a href="${profileLink}" style="text-decoration:none;">
                            <img src="${c.avatar || defaultAvatar}" style="width:40px; height:40px; border-radius:50%; border:2px solid #d4a373; object-fit:cover;">
                        </a>
                        <div style="flex:1;">
                            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                                <a href="${profileLink}" style="text-decoration:none;">
                                    <h4 style="color:#d4a373; font-size:0.95rem; margin:0; display:flex; align-items:center; flex-wrap:wrap; gap:5px;">
                                        ${c.username} ${badgeHTML}
                                    </h4>
                                </a>
                                <small style="color:#888; font-size:0.7rem;">${displayDate}</small>
                            </div>
                            <p style="color:#ddd; font-size:0.95rem; margin:5px 0 0 0; line-height:1.5; word-break: break-word;">${c.content}</p>
                            ${deleteBtnHTML}
                        </div>
                    </div>`;

                    if (list) list.innerHTML += html;
                }

            } catch (err) { console.error(err); }
        }

        async function deleteComment(commentId) {
            if (!confirm("Bu yorumu gerçekten silmek istiyor musun?")) return;
            let token = localStorage.getItem('token') || localStorage.getItem('userToken');
            if (!token) return alert("Yetkin yok.");
            token = token.replace(/"/g, '').trim();

            try {
                const res = await fetch(`${API_BASE}/comments/${commentId}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    alert("Yorum silindi! 🗑️");
                    loadComments();
                }
            } catch (e) { console.error(e); }
        }

        // ==========================================
        // 4. BEĞENME (LIKE) SİSTEMİ (Lokal)
        // ==========================================
        function toggleLike(btn) {
            if (!contentId) return;
            const user = JSON.parse(localStorage.getItem('user'));
            if (!user) { alert("Beğenmek için giriş yapmalısın!"); return; }

            let likedItems = JSON.parse(localStorage.getItem('likedItems') || "[]");
            const index = likedItems.indexOf(contentId);
            const icon = btn.querySelector('i');

            if (index > -1) {
                likedItems.splice(index, 1);
                btn.classList.remove('active');
                icon.classList.remove('ph-fill'); icon.classList.add('ph-bold');
            } else {
                likedItems.push(contentId);
                btn.classList.add('active');
                icon.classList.remove('ph-bold'); icon.classList.add('ph-fill');
            }
            localStorage.setItem('likedItems', JSON.stringify(likedItems));
        }

        function checkLikeStatus() {
            if (!contentId) return;
            const btn = document.querySelector('.like-btn');
            if (!btn) return;

            let likedItems = JSON.parse(localStorage.getItem('likedItems') || "[]");
            if (likedItems.includes(contentId)) {
                btn.classList.add('active');
                const icon = btn.querySelector('i');
                icon.classList.remove('ph-bold'); icon.classList.add('ph-fill');
            }
        }

        // ==========================================
        // 5. AMBİYANS SES SİSTEMİ
        // ==========================================
        let currentAudio = null;
        function toggleAmbiancePanel() { document.getElementById('ambiancePanel').classList.toggle('active'); }

        function playAmbiance(type, element) {
            const audioId = `audio-${type}`;
            const audioElement = document.getElementById(audioId);
            const volumeControl = document.getElementById('volumeControl');
            const toggleBtn = document.querySelector('.ambiance-toggle');

            if (currentAudio === audioElement && !audioElement.paused) {
                audioElement.pause();
                element.classList.remove('active');
                toggleBtn.classList.remove('playing');
                currentAudio = null;
                return;
            }

            stopAllSounds();

            if (audioElement) {
                audioElement.volume = volumeControl.value;
                audioElement.play().catch(e => console.log("Oynatma hatası:", e));
                currentAudio = audioElement;
                element.classList.add('active');
                toggleBtn.classList.add('playing');
            }
        }

        function stopAllSounds() {
            document.querySelectorAll('audio').forEach(audio => {
                audio.pause();
                audio.currentTime = 0;
            });
            document.querySelectorAll('.sound-item').forEach(item => {
                item.classList.remove('active');
            });
        }

        const volSlider = document.getElementById('volumeControl');
        if (volSlider) {
            volSlider.addEventListener('input', (e) => {
                if (currentAudio) currentAudio.volume = e.target.value;
            });
        }

    </script>
</body>

</html>
