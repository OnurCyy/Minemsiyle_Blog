<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Yazı Yükleniyor... | Minemsiyle</title>

    <link rel="icon" href="/assets/images/Logo.png" type="image/png">

    <link rel="stylesheet" href="/css/post.css">
    <link rel="stylesheet" href="/css/main.css">

    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap"
        rel="stylesheet">
    <script>
        (function () {
            // Hafızaya bak, yoksa 'light' yap
            var savedTheme = localStorage.getItem('theme') || 'light';
            // Sayfa yüklenmeden HTML'e rengi bas
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
</head>

<body>

    <header class="header">
        <div class="header__inner">
            <div class="brand">
                <a class="brand__logo" href="index.html">
                    <img src="/assets/images/Logo.png" alt="Minemsiyle" style="height: 40px;">
                </a>
            </div>
            <nav class="nav">
                <a href="/" class="nav__link">Ana Sayfa</a>

                <div class="theme-switch-wrapper">
                    <label class="theme-switch" for="checkbox">
                        <input type="checkbox" id="checkbox" />
                        <div class="slider round"></div>
                    </label>
                </div>
            </nav>
        </div>
    </header>

    <main class="article-container">
        <a href="/" class="back-btn">← Geri Dön</a>

        <div id="articleArea">
            <div style="text-align:center; margin-top:50px;">
                <p style="color:var(--muted);">Sayfa yükleniyor...</p>
            </div>
        </div>
        <div class="blog-footer">

            <div class="action-buttons" style="display: flex; gap: 12px; margin: 20px 0;">

                <button id="likeBtn" onclick="toggleLike()" class="btn btn--ghost"
                    style="display:flex; align-items:center; gap:8px; border:1px solid var(--line); cursor:pointer; border-radius: 50px; padding: 8px 16px; background: transparent;">

                    <svg id="likeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition: all 0.3s;">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                        </path>
                    </svg>

                    <span id="likeText" style="color: var(--ink);"> Beğen</span>
                </button>

                <button onclick="shareContent()" class="btn btn--ghost" id="shareBtn"
                    style="display:flex; align-items:center; gap:8px; border:1px solid var(--line); cursor:pointer;">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="18" cy="5" r="3"></circle>
                        <circle cx="6" cy="12" r="3"></circle>
                        <circle cx="18" cy="19" r="3"></circle>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                    </svg>
                    <span id="shareText">Paylaş</span>
                </button>

                <button id="saveBtn" onclick="toggleSave()" class="btn btn--ghost"
                    style="display:flex; align-items:center; gap:8px; border:1px solid var(--line); cursor:pointer; border-radius: 50px; padding: 8px 16px; background: transparent; transition: all 0.3s;">
                    <svg id="saveIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition: all 0.3s;">
                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span id="saveText" style="color: var(--ink);">Kaydet</span>
                </button>
            </div>
        </div>


        <div class="blog-comments-section">
            <div class="blog-comment-header">
                <i class="ph-duotone ph-chats-teardrop"></i> Okur Köşesi (<span id="commentCount">0</span>)
            </div>

            <div class="blog-comment-box">
                <textarea id="commentText" placeholder="Yazı hakkındaki düşüncelerin neler?"></textarea>

                <div class="blog-comment-footer">
                    <button class="blog-send-btn" onclick="postComment()">Yorumu Yayınla</button>
                </div>
            </div>

            <div class="comments-list" id="commentsList" style="margin-top: 30px;">
            </div>
        </div>
    </main>

    <div class="ambiance-widget" id="ambianceWidget">
        <button class="ambiance-toggle" onclick="toggleAmbiancePanel()" title="Odak Modu">
            <span class="music-note">🎵</span>
        </button>

        <div class="ambiance-panel" id="ambiancePanel">
            <div class="ambiance-header">
                <span>Odak Modu</span>
                <button onclick="toggleAmbiancePanel()"
                    style="background:none; border:none; color:var(--muted); cursor:pointer;">✕</button>
            </div>

            <div class="sound-options">
                <div class="sound-item" onclick="playAmbiance('rain', this)">
                    <span>🌧️</span>
                    <small>Yağmur</small>
                </div>
                <div class="sound-item" onclick="playAmbiance('cafe', this)">
                    <span>☕</span>
                    <small>Kafe</small>
                </div>
                <div class="sound-item" onclick="playAmbiance('fire', this)">
                    <span>🔥</span>
                    <small>Şömine</small>
                </div>
                <div class="sound-item" onclick="playAmbiance('forest', this)">
                    <span>🌲</span>
                    <small>Orman</small>
                </div>
                <div class="sound-item" onclick="playAmbiance('night', this)">
                    <span>🌙</span>
                    <small>Gece</small>
                </div>
                <div class="sound-item" onclick="playAmbiance('snow', this)">
                    <span>❄️</span>
                    <small>Kar</small>
                </div>
            </div>

            <div class="volume-container">
                <span style="font-size:12px; color:var(--muted);">Ses:</span>
                <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="0.5">
            </div>
        </div>

        <div id="audio-container">
            <audio id="audio-rain" loop src="/assets/sounds/Yagmur.mp3"></audio>

            <audio id="audio-cafe" loop src="/assets/sounds/Cafe.mp3"></audio>

            <audio id="audio-fire" loop src="/assets/sounds/KampAtesi.mp3"></audio>

            <audio id="audio-forest" loop src="/assets/sounds/Doga.mp3"></audio>

            <audio id="audio-night" loop src="/assets/sounds/Gece.mp3"></audio>

            <audio id="audio-snow" loop src="/assets/sounds/Kar.mp3"></audio>
        </div>
    </div>

    <footer class="footer" style="padding: 30px 0; border-top: 1px solid var(--line); margin-top: 40px;">
        <div class="container" style="text-align:center; color:var(--muted); font-size:12px;">
            &copy; 2026 Minemsiyle
        </div>
    </footer>

    <script>
        // ==========================================
        // 🌍 GLOBAL AYARLAR VE URL PARÇALAMA
        // ==========================================
        const API_BASE = "/api";
        let contentId = null;
        const defaultAvatar = "https://cdn-icons-png.flaticon.com/512/3135/3135715.png";

        // 🔥 YENİ SİSTEM: URL'DEN ID/SLUG OKUMA
        const pathArray = window.location.pathname.split('/');
        const currentRelatedId = pathArray[pathArray.length - 1]; // Linkin sonundaki ID'yi alır
        const currentType = 'blog'; // 👈 BURASI BLOG İÇİN SABİT


        // ==========================================
        // 1. SAYFA YÜKLENİNCE YAZIYI GETİR
        // ==========================================
        document.addEventListener("DOMContentLoaded", async () => {
            checkUserLoginForComments();

            // ID Kontrolü
            if (!currentRelatedId || currentRelatedId === "blog") {
                showError("Linkte ID bulunamadı. Lütfen ana sayfadan tekrar deneyin.");
                return;
            }

            // Backend'den Blog Yazısını Çek
            try {
                // Blog yazıları için /posts adresine gidiyoruz
                const res = await fetch(`${API_BASE}/posts/${currentRelatedId}`);

                if (!res.ok) {
                    showError(`Yazı bulunamadı! (Hata Kodu: ${res.status})`);
                    return;
                }

                const post = await res.json();
                contentId = post._id || currentRelatedId;

                // Sayfayı Doldur
                renderPost(post);

                // Etkileşimleri Başlat
                updateHeaderProfile();
                checkLikeStatus();
                checkSaveStatus();
                loadComments();

            } catch (err) {
                console.error("Fetch Hatası:", err);
                showError("Sunucuya bağlanılamadı. Backend kapalı olabilir.");
            }
        });

        // YAZIYI EKRANA ÇİZME FONKSİYONU
        function renderPost(post) {
            const date = new Date(post.createdAt || post.date || Date.now()).toLocaleDateString('tr-TR', { day: 'numeric', month: 'long', year: 'numeric' });
            const contentArea = document.getElementById("articleArea");
            const interactionArea = document.querySelector(".blog-footer");

            document.title = `${post.title} | Minemsiyle`;

            const imageSrc = post.cover || post.image || "";
            let imgHTML = imageSrc.length > 5 ? `<img src="${imageSrc}" class="article-cover" alt="${post.title}" style="width:100%; border-radius:12px; margin-bottom:20px; object-fit:cover;">` : '';

            contentArea.innerHTML = `
                <div class="article-header">
                    <div class="article-meta" style="color:var(--accent); font-weight:bold; font-size:0.8rem; margin-bottom:10px;">
                        ${post.category || post.tag || "GENEL"} • ${date}
                    </div>
                    <h1 class="article-title" style="font-family:var(--serif); font-size:2.2rem; margin-bottom:20px;">${post.title}</h1>
                </div>
                ${imgHTML}
                <div class="article-content" style="font-size:1.1rem; line-height:1.7; color:var(--ink);">
                    ${formatContent(post.content || post.desc)}
                </div>
            `;

            if (interactionArea) interactionArea.style.display = "block";
        }

        function showError(message) {
            const area = document.getElementById("articleArea");
            area.innerHTML = `
            <div style="text-align:center; padding:50px; background:var(--bg-card); border-radius:12px; border:1px solid var(--border);">
                <h2 style="color:#ef4444;">😔 Ops!</h2>
                <p>${message}</p>
                <a href="/" style="display:inline-block; margin-top:20px; color:var(--accent); text-decoration:underline;">Ana Sayfaya Dön</a>
            </div>
            `;
        }

        function formatContent(text) {
            if (!text) return "İçerik yok.";
            if (!text.includes("<p>")) return text.split('\n').map(p => p.trim() ? `<p>${p}</p>` : "").join('');
            return text;
        }

        // ==========================================
        // 2. YARDIMCI FONKSİYONLAR & PROFİL
        // ==========================================
        function updateHeaderProfile() {
            const user = JSON.parse(localStorage.getItem('user'));
            const profileLink = document.getElementById('headerProfileLink');
            if (user && user.avatar && profileLink) {
                profileLink.innerHTML = `<img src="${user.avatar}" style="width:30px; height:30px; border-radius:50%; object-fit:cover;" alt="Profil">`;
                profileLink.href = "/profile.html";
            }
        }

        function checkUserLoginForComments() {
            const user = JSON.parse(localStorage.getItem('user'));
            const commentBox = document.querySelector('.blog-comment-box');
            if (!commentBox) return;
            if (!user) {
                commentBox.innerHTML = `
                <div style="padding: 30px; text-align: center; color: var(--text-muted); background: var(--panel); border: 1px dashed var(--line); border-radius: 12px;">
                    <i class="ph-duotone ph-lock-key" style="font-size: 2rem; margin-bottom: 10px; color: var(--accent);"></i>
                    <p style="margin:0;">Yorum yapmak için <a href="/login.html" style="color: var(--accent); font-weight: bold; text-decoration: underline;">giriş yapmalısın</a>.</p>
                </div>
            `;
            }
        }

        // ==========================================
        // 3. YORUM SİSTEMİ (ZIRHLI)
        // ==========================================
        async function postComment() {
            const input = document.getElementById('commentText');
            const rawUser = localStorage.getItem('user');

            if (!rawUser) {
                alert("Giriş yapmamışsın Kral! Login sayfasına yönlendiriyorum.");
                window.location.href = "/login.html";
                return;
            }

            const user = JSON.parse(rawUser);
            const userId = user._id || user.id;

            if (!userId) {
                alert("Kimlik bilgisi bozulmuş. Tekrar giriş yapmalısın! 🔄");
                localStorage.clear();
                window.location.href = "/login.html";
                return;
            }

            let token = localStorage.getItem('token') || localStorage.getItem('userToken');
            if (!token) return alert("Anahtarın (Token) eksik. Tekrar giriş yapmalısın.");
            token = token.replace(/"/g, '').trim();

            const text = input.value.trim();
            if (!text) return alert("Boş yorum olmaz! ✍️");

            const btn = document.querySelector('.blog-send-btn');
            if (btn) { btn.innerText = "⏳..."; btn.disabled = true; }

            try {
                const pageTitle = document.querySelector('h1') ? document.querySelector('h1').innerText : document.title;

                const payload = {
                    userId: userId,
                    username: user.username,
                    avatar: user.avatar,
                    content: text,
                    contentType: currentType, // 'blog'
                    relatedId: currentRelatedId,
                    title: pageTitle
                };

                const res = await fetch("/api/comments", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}`
                    },
                    body: JSON.stringify(payload)
                });

                if (res.ok) {
                    input.value = "";
                    loadComments();
                    alert("Yorumun yapıştırıldı! 🚀");
                } else {
                    const err = await res.json();
                    alert("Hata: " + (err.message || "Sunucu reddetti"));
                }
            } catch (err) {
                console.error("Bağlantı Hatası:", err);
                alert("Sunucuya ulaşılamadı!");
            } finally {
                if (btn) { btn.innerText = "Yorumu Yayınla"; btn.disabled = false; }
            }
        }

        async function loadComments() {
            const list = document.getElementById('commentsList');
            const countSpan = document.getElementById('commentCount');
            const currentUser = JSON.parse(localStorage.getItem('user'));

            if (!currentRelatedId) return;

            try {
                const res = await fetch(`${API_BASE}/comments?type=${currentType}&id=${currentRelatedId}`);
                const comments = await res.json();

                if (list) list.innerHTML = "";
                if (countSpan) countSpan.innerText = comments.length;

                if (comments.length === 0 && list) {
                    list.innerHTML = "<p style='color:#888; font-style:italic; text-align:center; padding: 20px;'>Henüz yorum yok. İlk yorumu sen yap! 👇</p>";
                    return;
                }

                for (const c of comments) {
                    const displayDate = new Date(c.date).toLocaleDateString('tr-TR') + ' • ' + new Date(c.date).toLocaleTimeString('tr-TR', { hour: '2-digit', minute: '2-digit' });
                    let badgeHTML = (c.username === "Minemsi" || c.username === "OnurCy") ? `<span style="background:#ffd700; color:#000; font-size:0.7rem; padding:3px 8px; border-radius:6px; margin-left:5px; font-weight:bold;">👑 Yönetici</span>` : "";

                    let deleteBtnHTML = "";
                    const isOwner = currentUser && (currentUser.username === c.username);
                    const isAdmin = currentUser && (currentUser.role === 'admin' || currentUser.username === 'OnurCy');

                    if (isOwner || isAdmin) {
                        deleteBtnHTML = `<button onclick="deleteComment('${c._id}')" style="background:none; border:none; color:#e74c3c; font-size:0.8rem; cursor:pointer; margin-top:8px; padding:0; display:flex; align-items:center; gap:4px; opacity:0.8; transition:0.3s;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'"><i class="ph-bold ph-trash"></i> Sil</button>`;
                    }

                    const profileLink = `/profile.html?u=${c.username}`;

                    const html = `
                    <div class="single-comment" style="display:flex; gap:15px; margin-bottom:15px; background:rgba(255,255,255,0.05); padding:15px; border-radius:12px; border:1px solid rgba(255,255,255,0.1);">
                        <a href="${profileLink}" style="text-decoration:none;">
                            <img src="${c.avatar || defaultAvatar}" style="width:40px; height:40px; border-radius:50%; border:2px solid var(--line); object-fit:cover;">
                        </a>
                        <div style="flex:1;">
                            <div style="display:flex; justify-content:space-between; align-items:flex-start;">
                                <a href="${profileLink}" style="text-decoration:none;">
                                    <h4 style="color:var(--accent); font-size:0.95rem; margin:0; display:flex; align-items:center; flex-wrap:wrap; gap:5px;">
                                        ${c.username} ${badgeHTML}
                                    </h4>
                                </a>
                                <small style="color:var(--muted); font-size:0.7rem;">${displayDate}</small>
                            </div>
                            <p style="color:var(--ink); font-size:0.95rem; margin:5px 0 0 0; line-height:1.5; word-break: break-word;">${c.content}</p>
                            ${deleteBtnHTML}
                        </div>
                    </div>`;

                    if (list) list.innerHTML += html;
                }

            } catch (err) { console.error(err); }
        }

        async function deleteComment(commentId) {
            if (!confirm("Bu yorumu gerçekten silmek istiyor musun?")) return;
            let token = localStorage.getItem('token') || localStorage.getItem('userToken');
            if (!token) return alert("Yetkin yok.");
            token = token.replace(/"/g, '').trim();

            try {
                const res = await fetch(`${API_BASE}/comments/${commentId}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    alert("Yorum silindi! 🗑️");
                    loadComments();
                }
            } catch (e) { console.error(e); }
        }

        // ==========================================
        // 4. BEĞENME (LIKE) & KAYDETME (SAVE)
        // ==========================================
        async function toggleLike() {
            const userString = localStorage.getItem('user');
            if (!userString) return alert("Giriş yapmalısın!");

            const user = JSON.parse(userString);
            const icon = document.getElementById('likeIcon');
            const text = document.getElementById('likeText');
            const btn = document.getElementById('likeBtn');
            const pageTitle = document.querySelector('h1') ? document.querySelector('h1').innerText : document.title;
            const isLiked = icon.style.fill !== "none";

            if (!isLiked) {
                icon.style.fill = "#e91e63"; icon.style.stroke = "#e91e63";
                if (text) text.innerText = "Beğendin";
                if (text) text.style.color = "#e91e63";
                if (btn) btn.style.borderColor = "#e91e63";
            } else {
                icon.style.fill = "none"; icon.style.stroke = "currentColor";
                if (text) text.innerText = "Beğen";
                if (text) text.style.color = "var(--ink)";
                if (btn) btn.style.borderColor = "var(--line)";
            }

            try {
                await fetch(`${API_BASE}/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: user.name || user.username,
                        type: currentType,
                        itemId: currentRelatedId,
                        title: pageTitle
                    })
                });
            } catch (e) { console.error(e); }
        }

        async function checkLikeStatus() {
            const userString = localStorage.getItem('user');
            if (!userString || !document.getElementById('likeBtn')) return;
            const user = JSON.parse(userString);

            try {
                const res = await fetch(`${API_BASE}/profile/saved/${user.name || user.username}`);
                if (res.ok) {
                    const items = await res.json();
                    if (items.some(i => i.itemId === currentRelatedId)) {
                        const icon = document.getElementById('likeIcon');
                        const text = document.getElementById('likeText');
                        const btn = document.getElementById('likeBtn');
                        if (icon) { icon.style.fill = "#e91e63"; icon.style.stroke = "#e91e63"; }
                        if (text) { text.innerText = "Beğendin"; text.style.color = "#e91e63"; }
                        if (btn) btn.style.borderColor = "#e91e63";
                    }
                }
            } catch (e) { console.error(e); }
        }

        async function toggleSave() {
            const userString = localStorage.getItem('user');
            if (!userString) return alert("Giriş yapmalısın!");

            const user = JSON.parse(userString);
            const icon = document.getElementById('saveIcon');
            const text = document.getElementById('saveText');
            const btn = document.getElementById('saveBtn');
            const pageTitle = document.querySelector('h1') ? document.querySelector('h1').innerText : document.title;
            const isSaved = icon.style.fill !== "none" && icon.style.fill !== "";

            if (!isSaved) {
                icon.style.fill = "var(--accent)"; icon.style.stroke = "var(--accent)";
                if (text) { text.innerText = "Kaydedildi"; text.style.color = "var(--accent)"; }
                if (btn) btn.style.borderColor = "var(--accent)";
            } else {
                icon.style.fill = "none"; icon.style.stroke = "currentColor";
                if (text) { text.innerText = "Kaydet"; text.style.color = "var(--ink)"; }
                if (btn) btn.style.borderColor = "var(--line)";
            }

            try {
                let token = localStorage.getItem('token');
                if (token) token = token.replace(/"/g, '').trim();

                await fetch(`${API_BASE}/users/save`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({
                        itemId: currentRelatedId,
                        title: pageTitle,
                        type: currentType,
                        url: window.location.href
                    })
                });
            } catch (e) { console.error(e); }
        }

        async function checkSaveStatus() {
            const userString = localStorage.getItem('user');
            if (!userString || !document.getElementById('saveBtn')) return;

            const user = JSON.parse(userString);

            try {
                let token = localStorage.getItem('token');
                if (token) token = token.replace(/"/g, '').trim();

                const res = await fetch(`${API_BASE}/users/profile`, { headers: { 'Authorization': `Bearer ${token}` } });
                if (res.ok) {
                    const userData = await res.json();
                    if (userData.savedItems && userData.savedItems.some(item => item.itemId === currentRelatedId)) {
                        const icon = document.getElementById('saveIcon');
                        const text = document.getElementById('saveText');
                        const btn = document.getElementById('saveBtn');
                        if (icon) { icon.style.fill = "var(--accent)"; icon.style.stroke = "var(--accent)"; }
                        if (text) { text.innerText = "Kaydedildi"; text.style.color = "var(--accent)"; }
                        if (btn) btn.style.borderColor = "var(--accent)";
                    }
                }
            } catch (e) { console.error(e); }
        }

        async function shareContent() {
            try {
                await navigator.share({ title: document.title, url: window.location.href });
            } catch (e) {
                const btn = document.getElementById('shareText');
                if (btn) btn.innerText = "Link Kopyalandı!";
                navigator.clipboard.writeText(window.location.href);
                setTimeout(() => { if (btn) btn.innerText = "Paylaş"; }, 2000);
            }
        }

        // ==========================================
        // 5. TEMA AYARI (ÇİFTE DİKİŞ)
        // ==========================================
        const themeToggleSwitch = document.querySelector('.theme-switch input[type="checkbox"]');
        if (themeToggleSwitch) {
            const currentTheme = localStorage.getItem('theme');

            if (currentTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                document.body.classList.add('dark', 'dark-theme');
                themeToggleSwitch.checked = true;
            }

            themeToggleSwitch.addEventListener('change', (e) => {
                if (e.target.checked) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    document.body.classList.add('dark', 'dark-theme');
                    localStorage.setItem('theme', 'dark');
                } else {
                    document.documentElement.setAttribute('data-theme', 'light');
                    document.body.classList.remove('dark', 'dark-theme');
                    localStorage.setItem('theme', 'light');
                }
            });
        }
    </script>
</body>

</html>
