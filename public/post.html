<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="no-referrer">
    <title>Yazı Yükleniyor... | Minemsiyle</title>

    <!-- ========= Tema: Sayfa yüklenmeden önce temayı uygula ========= -->
    <script>
        (function () {
            var savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>

    <!-- ========= Harici Kütüphaneler ========= -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:ital,wght@0,300;0,400;0,700;1,300&display=swap"
        rel="stylesheet">

    <!-- ========= Stil Dosyaları ========= -->
    <link rel="icon" href="/assets/images/Logo.png" type="image/png">
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/post.css">
</head>

<body>

    <!-- ========= HEADER: Logo, Navigasyon, Tema Butonu ========= -->
    <header class="header">
        <div class="header__inner">
            <div class="brand">
                <a class="brand__logo" href="/">
                    <img src="/assets/images/Logo.png" alt="Minemsiyle" style="height: 40px;">
                </a>
            </div>
            <nav class="nav">
                <a href="/" class="nav__link">Ana Sayfa</a>
                <div class="theme-switch-wrapper">
                    <label class="theme-switch" for="checkbox">
                        <input type="checkbox" id="checkbox" />
                        <div class="slider round"></div>
                    </label>
                </div>
            </nav>
        </div>
    </header>

    <!-- ========= ANA İÇERİK ALANI ========= -->
    <main class="article-container">

        <!-- ========= Geri Dön Butonu ========= -->
        <a href="/" class="back-btn">← Geri Dön</a>

        <!-- ========= Yazı İçeriği (JS ile doldurulur) ========= -->
        <div id="articleArea">
            <div style="text-align:center; margin-top:50px;">
                <p style="color:var(--muted);">Sayfa yükleniyor...</p>
            </div>
        </div>

        <!-- ========= Seri Navigasyonu (JS ile açılır, varsayılan gizli) ========= -->
        <div id="seriesNavContainer"
            style="display:none; margin: 40px 0 20px 0; padding: 25px; background: rgba(192, 125, 86, 0.05); border: 1px solid var(--accent); border-radius: 12px; text-align: center;">
            <h4 id="seriesTitle"
                style="margin-top: 0; color: var(--accent); font-family: Merriweather, serif; margin-bottom: 20px; font-size: 1.2rem;">
                📚 Seri Adı Gelecek
            </h4>
            <div
                style="display: flex; justify-content: space-between; align-items: center; gap: 15px; flex-wrap: wrap;">
                <a id="prevSeriesBtn" href="#"
                    style="display:none; flex: 1; text-align: center; text-decoration: none; padding: 12px 20px; border-radius: 50px; background: var(--panel); border: 1px solid var(--line); color: var(--ink); font-weight: 600; transition: all 0.3s;"
                    onmouseover="this.style.borderColor='var(--accent)'; this.style.color='var(--accent)'; this.style.transform='translateX(-5px)';"
                    onmouseout="this.style.borderColor='var(--line)'; this.style.color='var(--ink)'; this.style.transform='translateX(0)';">
                    <i class="ph-bold ph-arrow-left"></i> Önceki Bölüm
                </a>
                <a id="nextSeriesBtn" href="#"
                    style="display:none; flex: 1; text-align: center; text-decoration: none; padding: 12px 20px; border-radius: 50px; background: var(--panel); border: 1px solid var(--line); color: var(--ink); font-weight: 600; transition: all 0.3s;"
                    onmouseover="this.style.borderColor='var(--accent)'; this.style.color='var(--accent)'; this.style.transform='translateX(5px)';"
                    onmouseout="this.style.borderColor='var(--line)'; this.style.color='var(--ink)'; this.style.transform='translateX(0)';">
                    Sonraki Bölüm <i class="ph-bold ph-arrow-right"></i>
                </a>
            </div>
        </div>

        <!-- ========= Aksiyon Butonları: Beğen, Paylaş, Kaydet, Düzenle ========= -->
        <div class="blog-footer">
            <div class="action-buttons" style="display: flex; flex-wrap: wrap; gap: 15px; margin: 20px 0;">

                <!-- Beğen Butonu -->
                <button id="likeBtn" onclick="toggleLike()" class="btn btn--ghost"
                    style="display:flex; align-items:center; gap:8px; border:1px solid var(--line); cursor:pointer; border-radius: 50px; padding: 8px 16px; background: transparent; transition: all 0.3s;"
                    onmouseover="this.style.background='rgba(233, 30, 99, 0.08)'; this.style.borderColor='#e91e63'; this.style.color='#e91e63'; this.style.transform='translateY(-2px)';"
                    onmouseout="this.style.transform='translateY(0)'; if(document.getElementById('likeIcon').style.fill === 'none' || document.getElementById('likeIcon').style.fill === '') { this.style.background='transparent'; this.style.borderColor='var(--line)'; this.style.color='var(--ink)'; }">
                    <svg id="likeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition: all 0.3s;">
                        <path
                            d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z">
                        </path>
                    </svg>
                    <span id="likeText" style="color: inherit;">Beğeni</span>
                </button>

                <!-- Paylaş Butonu -->
                <button onclick="shareContent()" class="btn btn--ghost" id="shareBtn"
                    style="display:flex; align-items:center; gap:8px; border:1px solid var(--line); cursor:pointer; border-radius: 50px; padding: 8px 16px; background: transparent; transition: all 0.3s;"
                    onmouseover="this.style.transform='translateY(-2px)';"
                    onmouseout="this.style.transform='translateY(0)';">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="18" cy="5" r="3"></circle>
                        <circle cx="6" cy="12" r="3"></circle>
                        <circle cx="18" cy="19" r="3"></circle>
                        <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                        <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                    </svg>
                    <span id="shareText" style="color: var(--ink);">Paylaş</span>
                </button>

                <!-- Kaydet Butonu -->
                <button id="saveBtn" onclick="toggleSave()" class="btn btn--ghost"
                    style="display:flex; align-items:center; gap:8px; border:1px solid var(--line); cursor:pointer; border-radius: 50px; padding: 8px 16px; background: transparent; transition: all 0.3s;"
                    onmouseover="this.style.transform='translateY(-2px)';"
                    onmouseout="this.style.transform='translateY(0)';">
                    <svg id="saveIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="transition: all 0.3s;">
                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                    </svg>
                    <span id="saveText" style="color: var(--ink);">Kaydet</span>
                </button>

                <!-- Admin: Yazıyı Düzenle Butonu (JS ile gösterilir) -->
                <button id="adminEditBtn" onclick="openEditModal()" class="btn btn--ghost"
                    style="display:none; align-items:center; gap:8px; border:1px solid var(--accent); cursor:pointer; border-radius: 50px; padding: 8px 16px; background: var(--accent); color: #111; font-weight: bold; transition: all 0.3s; box-shadow: 0 4px 10px rgba(192, 125, 86, 0.2);"
                    onmouseover="this.style.transform='translateY(-2px)'; this.style.boxShadow='0 6px 15px rgba(192, 125, 86, 0.4)';"
                    onmouseout="this.style.transform='translateY(0)'; this.style.boxShadow='0 4px 10px rgba(192, 125, 86, 0.2)';">
                    <i class="ph-bold ph-pencil-simple"></i>
                    <span>Yazıyı Düzenle</span>
                </button>

                <!-- Okunma Sayacı -->
                <div
                    style="display:flex; align-items:center; gap:6px; color:var(--muted); font-size:0.95rem; font-weight:600; margin-left:auto;">
                    <i class="ph-bold ph-eye" style="font-size: 1.2rem;"></i>
                    <span id="viewCountText">0 Okunma</span>
                </div>

            </div>
        </div>

        <!-- ========= Beğenenleri Gör Linki ========= -->
        <div onclick="showLikers()"
            style="display:inline-flex; align-items:center; gap:6px; margin-top:-5px; margin-bottom:20px; font-size:0.9rem; color:var(--muted); cursor:pointer; transition:all 0.3s; font-weight:600;"
            onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">
            <i class="ph-bold ph-users"></i> Beğenenleri Gör
        </div>

        <!-- ========= Yorum Bölümü ========= -->
        <div class="blog-comments-section">
            <div class="blog-comment-header">
                <i class="ph-duotone ph-chats-teardrop"></i> Okur Köşesi (<span id="commentCount">0</span>)
            </div>
            <div class="blog-comment-box">
                <textarea id="commentText" placeholder="Yazı hakkındaki düşüncelerin neler?"></textarea>
                <div class="blog-comment-footer">
                    <button class="blog-send-btn" onclick="postComment()">Yorumu Yayınla</button>
                </div>
            </div>
            <div class="comments-list" id="commentsList" style="margin-top: 30px;"></div>
        </div>

    </main>

    <!-- ========= AMBİYANS MÜZİK WİDGETI ========= -->
    <div class="ambiance-widget" id="ambianceWidget">
        <button class="ambiance-toggle" onclick="toggleAmbiancePanel()" title="Odak Modu">
            <span class="music-note">🎵</span>
        </button>
        <div class="ambiance-panel" id="ambiancePanel">
            <div class="ambiance-header">
                <span>Odak Modu</span>
                <button onclick="toggleAmbiancePanel()"
                    style="background:none; border:none; color:var(--muted); cursor:pointer;">✕</button>
            </div>
            <div class="sound-options">
                <div class="sound-item" onclick="playAmbiance('rain', this)"><span>🌧️</span><small>Yağmur</small></div>
                <div class="sound-item" onclick="playAmbiance('cafe', this)"><span>☕</span><small>Kafe</small></div>
                <div class="sound-item" onclick="playAmbiance('fire', this)"><span>🔥</span><small>Şömine</small></div>
                <div class="sound-item" onclick="playAmbiance('forest', this)"><span>🌲</span><small>Orman</small></div>
                <div class="sound-item" onclick="playAmbiance('night', this)"><span>🌙</span><small>Gece</small></div>
                <div class="sound-item" onclick="playAmbiance('snow', this)"><span>❄️</span><small>Kar</small></div>
            </div>
            <div class="volume-container">
                <span style="font-size:12px; color:var(--muted);">Ses:</span>
                <input type="range" id="volumeControl" min="0" max="1" step="0.1" value="0.5">
            </div>
        </div>
        <!-- Ses Dosyaları -->
        <div id="audio-container">
            <audio id="audio-rain" loop src="/assets/sounds/Yagmur.mp3"></audio>
            <audio id="audio-cafe" loop src="/assets/sounds/Cafe.mp3"></audio>
            <audio id="audio-fire" loop src="/assets/sounds/KampAtesi.mp3"></audio>
            <audio id="audio-forest" loop src="/assets/sounds/Doga.mp3"></audio>
            <audio id="audio-night" loop src="/assets/sounds/Gece.mp3"></audio>
            <audio id="audio-snow" loop src="/assets/sounds/Kar.mp3"></audio>
        </div>
    </div>

    <!-- ========= MODAL: Admin Yazı Düzenleme ========= -->
    <div id="editModal" class="modal-overlay"
        style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:10000; align-items:center; justify-content:center; backdrop-filter:blur(10px); transition: 0.3s opacity;">
        <div class="modal-content"
            style="background:var(--panel); padding:35px; border-radius:24px; width:90%; max-width:650px; border:1px solid var(--line); box-shadow:0 15px 50px rgba(0,0,0,0.6);">

            <!-- Modal Başlık -->
            <div class="modal-header"
                style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px;">
                <h2 style="margin:0; font-family: Merriweather, serif; color:var(--accent);">Yazıyı Düzenle <span
                        style="font-weight:300; font-size:1rem; color:var(--muted);">[Admin Panel]</span></h2>
                <button onclick="closeEditModal()"
                    style="background:none; border:none; color:var(--muted); font-size:1.5rem; cursor:pointer; transition:0.3s;"
                    onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='var(--muted)'">✕</button>
            </div>

            <!-- Kapak Resmi -->
            <div style="margin-bottom:20px;">
                <label style="display:block; color:var(--muted); font-size:0.85rem; margin-bottom:8px;">Yazı Kapak Resmi
                    (Tıkla Değiştir)</label>
                <div id="editImagePreviewArea"
                    style="width:100%; height:180px; background:var(--bg); border-radius:12px; border:2px dashed var(--line); display:flex; align-items:center; justify-content:center; cursor:pointer; overflow:hidden; transition: 0.3s;"
                    onmouseover="this.style.borderColor='var(--accent)'"
                    onmouseout="this.style.borderColor='var(--line)'">
                    <img id="editImagePreview" src="" alt="Önizleme"
                        style="max-width:100%; max-height:100%; object-fit:contain; display:none;">
                    <div id="editImagePlaceholder" style="text-align:center; color:var(--muted);">
                        <i class="ph-bold ph-image-square"
                            style="font-size:3rem; margin-bottom:5px; display:block;"></i>
                        <span style="font-size:0.9rem;">Resim Yükle</span>
                    </div>
                </div>
                <input type="file" id="editImageInput" accept="image/*" style="display:none;">
            </div>

            <!-- Başlık -->
            <div style="margin-bottom:15px;">
                <label for="editTitle"
                    style="display:block; color:var(--muted); font-size:0.85rem; margin-bottom:5px;">Başlık</label>
                <input type="text" id="editTitle" placeholder="Yazı Başlığı"
                    style="width:100%; padding:14px; background:var(--bg); border:1px solid var(--line); color:var(--ink); border-radius:10px; font-family: Merriweather, serif;">
            </div>

            <!-- Seri Bilgileri -->
            <input type="text" id="editSeriesName" placeholder="Seri Adı (Örn: Avrupa Turu Anıları)"
                style="width: 100%; padding: 10px; margin-bottom: 10px; background: var(--bg); border: 1px solid var(--line); color: var(--ink); border-radius: 8px;">
            <input type="number" id="editSeriesOrder" placeholder="Bu serinin kaçıncı bölümü? (Örn: 1)"
                style="width: 100%; padding: 10px; margin-bottom: 15px; background: var(--bg); border: 1px solid var(--line); color: var(--ink); border-radius: 8px;">

            <!-- İçerik -->
            <div style="margin-bottom:25px;">
                <label for="editContent"
                    style="display:block; color:var(--muted); font-size:0.85rem; margin-bottom:5px;">İçerik</label>
                <textarea id="editContent" rows="12" placeholder="Yazı İçeriği"
                    style="width:100%; padding:14px; background:var(--bg); border:1px solid var(--line); color:var(--ink); border-radius:10px; resize:vertical; line-height:1.6; font-size:0.95rem;"></textarea>
            </div>

            <!-- Modal Butonları -->
            <div style="display:flex; gap:15px;">
                <button onclick="closeEditModal()"
                    style="flex:1; padding:15px; border-radius:12px; border:1px solid var(--line); background:none; color:var(--muted); font-weight:bold; cursor:pointer; transition:0.3s;"
                    onmouseover="this.style.borderColor='#ef4444'; this.style.color='#ef4444'"
                    onmouseout="this.style.borderColor='var(--line)'; this.style.color='var(--muted)'">Vazgeç</button>
                <button id="editSubmitBtn" onclick="submitEdit()"
                    style="flex:2; padding:15px; border-radius:12px; border:none; background:var(--accent); color:black; font-weight:bold; font-size:1.1rem; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:8px; transition:0.3s; box-shadow:0 5px 15px rgba(192,125,86,0.3);"
                    onmouseover="this.style.transform='translateY(-3px)'"
                    onmouseout="this.style.transform='translateY(0)'">
                    <i class="ph-bold ph-floppy-disk"></i> Güncellemeyi Kaydet
                </button>
            </div>
        </div>
    </div>

    <!-- ========= MODAL: Beğenenler Listesi ========= -->
    <div id="likersModal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:9999; align-items:center; justify-content:center; opacity:0; transition:opacity 0.3s; backdrop-filter: blur(4px);">
        <div
            style="background: var(--panel); width:90%; max-width:350px; border-radius:16px; padding:24px; border:1px solid var(--line); box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
            <div
                style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; border-bottom:1px solid var(--line); padding-bottom:12px;">
                <h3 style="margin:0; font-size:1.2rem; color:var(--ink); font-family: Merriweather, serif;">❤️
                    Beğenenler</h3>
                <button onclick="closeLikersModal()"
                    style="background:none; border:none; color:var(--muted); font-size:1.5rem; cursor:pointer; transition:0.3s;"
                    onmouseover="this.style.color='#e91e63'"
                    onmouseout="this.style.color='var(--muted)'">&times;</button>
            </div>
            <ul id="likersList" style="list-style:none; padding:0; margin:0; max-height:250px; overflow-y:auto;"></ul>
        </div>
    </div>

    <!-- ========= FOOTER ========= -->
    <footer class="footer" style="padding: 30px 0; border-top: 1px solid var(--line); margin-top: 40px;">
        <div class="container" style="text-align:center; color:var(--muted); font-size:12px;">
            &copy; 2026 Minemsiyle
        </div>
    </footer>

    <!-- ========= Harici JS Kütüphaneleri ========= -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/js/chat-component.js"></script>
    <script src="/js/post.js"></script>

</body>

</html>
